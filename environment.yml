name: geophysics-course

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core scientific (conda)
  - numpy>=1.21
  - scipy>=1.7
  - matplotlib>=3.5
  - pandas>=1.3

  # Geospatial (KEEP in conda!)
  - geopandas
  - shapely
  - fiona
  - rioxarray

  # Jupyter
  - jupyter
  - jupyterlab>=4.0
  - notebook
  - ipykernel
  - ipywidgets>=8.0

  # Visualization / ML
  - seaborn>=0.12
  - scikit-learn>=1.0
  - tqdm

  # Pip section
  - pip:
      - -r requirements.txt
